<app-navbar></app-navbar>
<div *ngIf="loading()" class="flex flex-col items-center justify-center p-10">
  <br>
  <p class="center mb-4 text-lg font-semibold text-gray-700">Carregando país...</p>
  <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
</div>


<div *ngIf="error()" class="text-center p-5 text-red-500">
  {{ error() }}
</div>

<div *ngIf="country() as c" class="flex flex-col items-center gap-4 p-8">

  <div class="flex justify-around items-center gap-8 flex-wrap">
    <h1 class="text-3xl font-bold mt-4">
      {{ c.name.common }}
    </h1>
    <img [src]="c.flags.png" class="w-64">

  </div>


  <p>População: {{ c.population }}</p>
  <p>Capital: {{ c.capital?.[0] }}</p>
  <p>Região: {{ c.region }}</p>
  <p>Subregião: {{ c.subregion }}</p>
  <p>Área: {{ c.area }} km²</p>
  <p>Línguas: {{ getLanguages(c) }}</p>
  <p>Moedas: {{ getCurrencies(c) }}</p>
  <p>Fronteiras: 
    <span *ngFor="let b of getBorderCountries(c)" >
      <button [routerLink]="['/country/code', b]" class="text-white bg-green-500 hover:bg-green-700 text-white font-bold py-1 mr-1 px-4 rounded ">{{b}}</button>
    </span>
  </p>
  <div class="flex justify-center">
    <button type="button" [routerLink]="['/']"
      class="flex bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded ">
      Voltar
    </button>
  </div>
</div>
