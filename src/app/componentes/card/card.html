<div class="max-w-sm rounded-2xl overflow-hidden shadow-lg hover:shadow-xl transition-shadow duration-300">


  <img class="w-full h-40 object-cover" [src]="flag" [alt]="name + ' flag'" />


  <div class="p-4  ">

    <div>


      <h2 class="text-xl font-bold text-gray-700 mb-2 line-clamp-1">
        {{ name }}
      </h2>

      <div class="text-gray-600 text-sm space-y-1">

        <p>
          <span class="font-semibold">População:</span>
          {{ population }}
        </p>

        <p>
          <span class="font-semibold">Região:</span>
          {{ region }}
        </p>

        <p>
          <span class="font-semibold">Capital:</span>
          {{ capital }}
        </p>

      </div>

      
    </div>
    <div class="flex justify-end
    ">
      <a [routerLink]="['/country', link]" class="text-blue-600 hover:text-blue-800 underline mt-4">
        Ver +
      </a>
    </div>

  </div>

</div>
